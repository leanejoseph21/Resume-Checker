<!DOCTYPE html>
<html>

<head>
    <title>Resume Checker</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>Resume Checker</h1>

        <p>Paste your resume below and check how well it matches the required skills.</p>

        <textarea id="resume"
            placeholder="Paste your resume text here..."></textarea>

        <br>

        <button onclick="checkResume()">
            Check Resume
        </button>

        <div id="matched"></div>

        <div id="missing"></div>

        <br>

        <progress id="bar" value="0" max="100"></progress>

        <h3 id="score"></h3>

        <h3 id="message"></h3>

    </div>

    <script src="script.js"></script>

</body>

</html>
